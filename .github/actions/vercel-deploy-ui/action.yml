name: vercel-deploy-ui
description: Download the Vercel build artifact and deploy it

inputs:
  vercel-token:
    description: Vercel API token
    required: true
  vercel-org-id:
    description: Vercel organisation or account ID
    required: true
  vercel-project-id:
    description: Vercel project ID
    required: true
  production:
    description: Deploy to production (adds --prod flag)
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Install Vercel CLI
      run: npm install --global vercel@latest
      shell: bash

    - name: Download build artifact
      uses: actions/download-artifact@v4
      with:
        name: vercel-build
        path: .vercel/output

    - name: Deploy
      run: vercel deploy --prebuilt ${{ inputs.production == 'true' && '--prod' || '' }} --token=${{ inputs.vercel-token }}
      shell: bash
      env:
        VERCEL_ORG_ID: ${{ inputs.vercel-org-id }}
        VERCEL_PROJECT_ID: ${{ inputs.vercel-project-id }}
